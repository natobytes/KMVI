name: Pull Request

on:
  pull_request:
    branches: [ "main" ]
  workflow_call:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: check
          - target: iosSimulatorArm64Test
          - target: jvmTest
          - target: :kmvi:compileKotlinJvm
          - target: :sample:compileKotlinJvm
          - target: :teslaDrive:assembleDebug
          - target: :teslaDrive:testDebugUnitTest
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Run
      run: ./gradlew ${{ matrix.target }}

  verify:
    needs: build
    runs-on: self-hosted
    steps:
      - run: echo "All checks passed"
